<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CV | Quin Campbell</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    /* --- Layout --- */
    .cv-container {
      padding: 40px 60px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .cv-container h1 {
      margin-top: 0;
    }

    /* --- PDF viewer --- */
    .pdf-desktop {
      display: block;
    }

    .pdf-mobile {
      display: none;
      margin-top: 20px;
    }

    .cv-frame {
      width: 100%;
      height: 900px;
      border: none;
      margin-top: 20px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    /* --- Download link --- */
    .download-link {
      margin-top: 15px;
      font-size: 16px;
    }

    .download-link a {
      color: #1e2a38;
      text-decoration: none;
      font-weight: bold;
    }

    .download-link a:hover {
      text-decoration: underline;
    }

    /* --- Mobile behavior --- */
    @media (max-width: 768px) {
      .pdf-desktop {
        display: none;
      }

      .pdf-mobile {
        display: block;
      }

      .mobile-pdf-link {
        font-size: 18px;
        font-weight: bold;
        color: #1e2a38;
        text-decoration: underline;
      }

      .cv-container {
        padding: 20px;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>Curriculum Vitae</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="projects.html">Projects</a>
      <a href="maps.html">Maps</a>
      <a href="publications.html">Publications & Presentations</a>
      <a href="cv.html">CV</a>
    </nav>
  </header>

  <section class="cv-container">

  <!-- Desktop PDF viewer -->
  <div class="pdf-desktop">
    <iframe 
      src="assets/docs/Quinlan_Campbell_CV.pdf"
      class="cv-frame">
    </iframe>
  </div>

  <!-- Mobile PDF viewer -->
  <div class="pdf-mobile">
    <a href="assets/docs/Quinlan_Campbell_CV.pdf" class="mobile-pdf-link">
      Tap here to view the full CV (PDF)
    </a>
  </div>

  <!-- Download link -->
  <div class="download-link">
    <a href="assets/docs/Quinlan_Campbell_CV.pdf" download>Download CV (PDF)</a>
  </div>

</section>


  <footer>
    <p>© 2026 Quin Campbell</p>
  </footer>
</body>
</html>
