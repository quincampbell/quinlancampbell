  <section class="content">
    <h2>Disaster Assistance Map</h2>
    <p>Spatial distribution of disaster assistance cases across Southwest Virginia.</p>
    <div id="map1" style="height: 500px; margin-bottom: 40px;"></div>
  </section>

  <section class="content">
    <h2>Macrophyte Distribution Map</h2>
    <p>Seasonal distribution of aquatic vegetation in Falling Creek Reservoir.</p>
    <div id="map2" style="height: 500px;"></div>
  </section>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script>
    // Map 1
    var map1 = L.map('map1').setView([37.1, -81.0], 8);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map1);

    // Map 2
    var map2 = L.map('map2').setView([37.2296, -80.4139], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map2);
  </script>
